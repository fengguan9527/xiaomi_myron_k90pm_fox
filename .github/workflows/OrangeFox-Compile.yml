name: OrangeFox - Build

# Credits to:
# https://github.com/TeamWin
# https://gitlab.com/OrangeFox
# https://github.com/azwhikaru for Recovery Builder Template
# And all Contributors in every repositories I used

on:
  workflow_dispatch:
    inputs:
      MANIFEST_BRANCH:
        description: 'OrangeFox 源码分支'
        required: true
        default: '16.0'
        type: choice
        options:
        - 16.0
        - 12.1
        - 11.0
      SYNC_REPO:
        description: 'sync 仓库地址'
        required: true
        default: 'https://gitlab.com/OrangeFox/sync.git'
      DEVICE_TREE:
        description: '设备树仓库地址'
        required: true
        default: 'https://github.com/fengguan9527/xiaomi_myron_k90pm_fox.git'
      DEVICE_TREE_BRANCH:
        description: '设备树分支'
        required: true
        default: 'main'
      DEVICE_PATH:
        description: '设备树路径'
        required: true
        default: 'device/xiaomi/myron'
      DEVICE_NAME:
        description: '设备代号'
        required: true
        default: 'myron'
      LUNCH_TARGET:
        description: '编译目标'
        required: true
        default: 'twrp_myron-bp2a-eng'
      BUILD_TARGET:
        description: '编译镜像'
        required: true
        default: 'recovery'
        type: choice
        options:
        - boot
        - recovery
        - vendorboot
      PATCHES:
        description: '需应用的补丁 (留空则不应用；填 all 应用全部；逗号分隔多选)'
        required: false
        default: 'all'
        type: string
      AVB_SIGNATURE:
        description: 'AVB 签名文件名 (留空则跳过 AVB 移植)'
        required: false
        default: 'avb_306.bin'
        type: string

jobs:
  build:
    name: Build OFR by ${{ github.actor }}
    runs-on: ubuntu-22.04
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      contents: write

    steps:
    # ──────────────────────────────────────────────────
    # 1. 杂项（检出仓库 + 清理磁盘 + 设置交换空间）
    # ──────────────────────────────────────────────────
    - name: 检出仓库
      uses: actions/checkout@v4

    - name: 清理磁盘
      uses: rokibhasansagar/slimhub_actions@main

    - name: 设置交换空间
      uses: pierotofy/set-swap-space@master
      with:
        swap-size-gb: 24

    # ──────────────────────────────────────────────────
    # 2. 安装 Android 编译环境
    # ──────────────────────────────────────────────────
    - name: 安装编译环境
      run: |
        sudo apt install aria2 -y
        git clone https://gitlab.com/OrangeFox/misc/scripts.git -b master
        cd scripts
        sudo bash setup/android_build_env.sh

    # ──────────────────────────────────────────────────
    # 3. 同步 OrangeFox 源码
    # ──────────────────────────────────────────────────
    - name: 同步源码
      if: inputs.MANIFEST_BRANCH == '16.0' || inputs.MANIFEST_BRANCH == '12.1' || inputs.MANIFEST_BRANCH == '11.0'
      run: |
        mkdir -p ${GITHUB_WORKSPACE}/OrangeFox
        cd ${GITHUB_WORKSPACE}/OrangeFox
        git config --global user.name "${{ github.actor }}"
        git config --global user.email "${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com"
        git clone ${{ inputs.SYNC_REPO }} -b master
        cd sync
        ./orangefox_sync.sh --branch ${{ inputs.MANIFEST_BRANCH }} --path ${GITHUB_WORKSPACE}/OrangeFox/fox_${{ inputs.MANIFEST_BRANCH }}

    # ──────────────────────────────────────────────────
    # 4. 克隆设备树
    # ──────────────────────────────────────────────────
    - name: 克隆设备树
      run: |
        cd ${GITHUB_WORKSPACE}/OrangeFox/fox_${{ inputs.MANIFEST_BRANCH }}
        git clone ${{ inputs.DEVICE_TREE }} -b ${{ inputs.DEVICE_TREE_BRANCH }} ./${{ inputs.DEVICE_PATH }}
        cd ${{ inputs.DEVICE_PATH }}
        echo "COMMIT_ID=$(git rev-parse HEAD)" >> $GITHUB_ENV

    # ──────────────────────────────────────────────────
    # 5. 编译 OrangeFox Recovery
    # ──────────────────────────────────────────────────
    - name: 编译 Recovery
      run: |
        cd ${GITHUB_WORKSPACE}/OrangeFox/fox_${{ inputs.MANIFEST_BRANCH }}
        
        # 修复 Bug 1：显式建立并将正确的源码绝对路径写入全局环境
        echo "ANDROID_BUILD_TOP=$(pwd)" >> $GITHUB_ENV
        
        set +e
        source build/envsetup.sh
        export ALLOW_MISSING_DEPENDENCIES=true
        set -e

        # 解析并应用补丁
        PATCH_INPUT=$(echo "${{ inputs.PATCHES }}" | xargs)
        PATCH_DIR="$(pwd)/${{ inputs.DEVICE_PATH }}"
        RECOVERY_DIR="$(pwd)/bootable/recovery"

        if [ -z "$PATCH_INPUT" ]; then
          echo "=================================================="
          echo "Notice: PATCHES input is empty. Skipping patch stage."
          echo "=================================================="
        else
          echo "================ Applying Patches ================"
          if [ "$PATCH_INPUT" = "all" ]; then
            echo "Applying all patches in device tree..."
            shopt -s nullglob
            for patch in "$PATCH_DIR"/*.patch; do
              echo "Applying $patch..."
              git -C "$RECOVERY_DIR" apply "$patch" || echo "Patch already applied or failed, ignoring..."
            done
            shopt -u nullglob
          else
            echo "Applying specific patches..."
            IFS=',' read -ra PATCH_LIST <<< "$PATCH_INPUT"
            for patch_file in "${PATCH_LIST[@]}"; do
              patch_file=$(echo "$patch_file" | xargs)
              if [ -n "$patch_file" ]; then
                if [ -f "$PATCH_DIR/$patch_file" ]; then
                  echo "Applying $patch_file..."
                  git -C "$RECOVERY_DIR" apply "$PATCH_DIR/$patch_file" || echo "Patch already applied or failed, ignoring..."
                else
                  echo "Warning: Patch $patch_file not found in device tree, skipping..."
                fi
              fi
            done
          fi
          echo "=================================================="
        fi

        lunch ${{ inputs.LUNCH_TARGET }} && make clean && mka ${{ inputs.BUILD_TARGET }}image

    # ──────────────────────────────────────────────────
    # 6. AVB 签名合并
    # ──────────────────────────────────────────────────
    - name: AVB 签名合并
      if: inputs.AVB_SIGNATURE != ''
      run: |
        cd ${GITHUB_WORKSPACE}/OrangeFox/fox_${{ inputs.MANIFEST_BRANCH }}

        echo "=================================================="
        echo "AVB 签名合并"
        echo "  签名文件: ${{ inputs.DEVICE_PATH }}/AVB/${{ inputs.AVB_SIGNATURE }}"
        echo "=================================================="

        # 环境变量注入，供 Python 脚本读取
        export AVB_SIG_FILE="${{ inputs.AVB_SIGNATURE }}"

        python3 ${GITHUB_WORKSPACE}/merge_avb.py

        echo "[+] AVB 签名合并完成!"

    # ──────────────────────────────────────────────────
    # 7. 设置发布信息 + 重命名 Release 文件
    # ──────────────────────────────────────────────────
    - name: 设置发布信息
      run: |
        echo "BUILD_DATE=$(TZ=Asia/Shanghai date +'%y%m%d')" >> $GITHUB_ENV
        echo "BUILD_TIME=$(TZ=Asia/Shanghai date +'%Y%m%d_%H%M%S')" >> $GITHUB_ENV

        # ★ bash 局部变量（供本步骤直接使用，解决 $GITHUB_ENV 延迟生效问题）
        BD=$(TZ=Asia/Shanghai date +'%y%m%d')

        cd ${GITHUB_WORKSPACE}/OrangeFox/fox_${{ inputs.MANIFEST_BRANCH }}

        DEVICE_TREE_URL="${{ inputs.DEVICE_TREE }}"
        if [[ "${DEVICE_TREE_URL}" == *.git ]]; then
          DEVICE_TREE_URL="${DEVICE_TREE_URL%.git}"
        fi

        echo "DEVICE_TREE_URL=${DEVICE_TREE_URL}" >> $GITHUB_ENV

        PATCH_INFO="${{ inputs.PATCHES }}"
        AVB_INFO="${{ inputs.AVB_SIGNATURE }}"

        if [ -z "$PATCH_INFO" ]; then
          PATCH_INFO="无"
        fi

        if [ -z "$AVB_INFO" ]; then
          AVB_INFO="无（跳过）"
        fi

        echo "RELEASE_PATCHES=$PATCH_INFO" >> $GITHUB_ENV
        echo "RELEASE_AVB=$AVB_INFO" >> $GITHUB_ENV


        # ==============================
        # Release 文件重命名
        # ==============================
        OUT_DIR="${GITHUB_WORKSPACE}/OrangeFox/fox_${{ inputs.MANIFEST_BRANCH }}/out/target/product/${{ inputs.DEVICE_NAME }}"
        RELEASE_DIR="${GITHUB_WORKSPACE}/release"

        mkdir -p "$RELEASE_DIR"

        # 使用 bash 局部变量 $BD，避免 $GITHUB_ENV 延迟导致空值
        BUILD_NAME="OrangeFox_${{ inputs.DEVICE_NAME }}_${BD}_REDMI-K90-PROMAX"

        # 复制 img（此时的 img 是已经被 Python 注入签名并覆盖重写的完好成品）
        for file in "$OUT_DIR"/OrangeFox*.img; do
          if [ -f "$file" ]; then
            cp "$file" "$RELEASE_DIR/${BUILD_NAME}.img"
          fi
        done

        # 复制 zip
        for file in "$OUT_DIR"/OrangeFox*.zip; do
          if [ -f "$file" ]; then
            cp "$file" "$RELEASE_DIR/${BUILD_NAME}.zip"
          fi
        done

        echo "========== Release 文件 =========="
        ls -lh "$RELEASE_DIR"


    # ──────────────────────────────────────────────────
    # 8. 上传到 GitHub Release
    # ──────────────────────────────────────────────────
    - name: 上传到 Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          release/*
        name: OrangeFox Recovery for ${{ inputs.DEVICE_NAME }} // ${{ env.BUILD_DATE }}
        tag_name: ${{ github.run_id }}
        body: |
          ## OrangeFox Recovery 非官方构建版

          源码分支: fox_${{ inputs.MANIFEST_BRANCH }}

          设备:
          [设备树/分支](${{ env.DEVICE_TREE_URL }}/tree/${{ inputs.DEVICE_TREE_BRANCH }})

          构建提交:
          [commit](${{ env.DEVICE_TREE_URL }}/commit/${{ env.COMMIT_ID }})

          构建时间:
          ${{ env.BUILD_TIME }}

          合入.patch补丁:
          ${{ env.RELEASE_PATCHES }}

          移植AVB签名:
          ${{ env.RELEASE_AVB }}
