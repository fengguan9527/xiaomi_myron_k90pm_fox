name: OrangeFox - Build

# Credits to:
# https://github.com/TeamWin
# https://gitlab.com/OrangeFox
# https://github.com/azwhikaru for Recovery Builder Template
# And all Contributors in every repositories I used

on:
  workflow_dispatch:
    inputs:
      MANIFEST_BRANCH:
        description: 'OrangeFox 源码分支'
        required: true
        default: '16.0'
        type: choice
        options:
        - 16.0
        - 12.1
        - 11.0
      DEVICE_TREE:
        description: '设备树仓库地址'
        required: true
        default: 'https://github.com/fengguan9527/xiaomi_myron_k90pm_fox.git'
      DEVICE_TREE_BRANCH:
        description: '设备树分支'
        required: true
        default: 'main'
      DEVICE_PATH:
        description: '设备树路径'
        required: true
        default: 'device/xiaomi/myron'
      DEVICE_NAME:
        description: '设备代号'
        required: true
        default: 'myron'
      LUNCH_TARGET:
        description: '编译目标'
        required: true
        default: 'twrp_myron-bp2a-eng'
      BUILD_TARGET:
        description: '编译镜像'
        required: true
        default: 'recovery'
        type: choice
        options:
        - boot
        - recovery
        - vendorboot
      PATCHES:
        description: '需应用的补丁 (留空则不应用；填 all 应用全部；逗号分隔多选)'
        required: false
        default: 'all'
        type: string
      AVB_SIGNATURE:
        description: 'AVB 签名文件名 (留空则跳过 AVB 移植)'
        required: false
        default: 'avb_306.bin'
        type: string

jobs:
  build:
    name: Build OFR by ${{ github.actor }}
    runs-on: ubuntu-22.04
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      contents: write

    steps:
    # ──────────────────────────────────────────────────
    # 1. 检出 Action Builder 仓库
    # ──────────────────────────────────────────────────
    - name: Checkout
      uses: actions/checkout@v4

    # ──────────────────────────────────────────────────
    # 2. 清理磁盘空间
    # ──────────────────────────────────────────────────
    - name: Clean-up
      uses: rokibhasansagar/slimhub_actions@main

    # ──────────────────────────────────────────────────
    # 3. 设置 24GB 交换空间（物理内存不够时用）
    # ──────────────────────────────────────────────────
    - name: Swap Space
      uses: pierotofy/set-swap-space@master
      with:
        swap-size-gb: 24

    # ──────────────────────────────────────────────────
    # 4. 安装 Android 编译环境
    # ──────────────────────────────────────────────────
    - name: Build Environment
      run: |
        sudo apt install aria2 -y
        git clone https://gitlab.com/OrangeFox/misc/scripts.git -b master
        cd scripts
        sudo bash setup/android_build_env.sh

    # ──────────────────────────────────────────────────
    # 5. 同步 OrangeFox 源码
    # ──────────────────────────────────────────────────
    - name: Set-up Manifest
      if: inputs.MANIFEST_BRANCH == '16.0' || inputs.MANIFEST_BRANCH == '12.1' || inputs.MANIFEST_BRANCH == '11.0'
      run: |
        mkdir -p ${GITHUB_WORKSPACE}/OrangeFox
        cd ${GITHUB_WORKSPACE}/OrangeFox
        git config --global user.name "${{ github.actor }}"
        git config --global user.email "${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com"
        # 16.0 使用特定的 sync 仓库
        if [ "${{ inputs.MANIFEST_BRANCH }}" == "16.0" ]; then
          git clone https://github.com/OrangeFox16/sync.git -b master
        else
          git clone https://gitlab.com/OrangeFox/sync.git -b master
        fi
        cd sync
        ./orangefox_sync.sh --branch ${{ inputs.MANIFEST_BRANCH }} --path ${GITHUB_WORKSPACE}/OrangeFox/fox_${{ inputs.MANIFEST_BRANCH }}

    # ──────────────────────────────────────────────────
    # 6. 克隆设备树到指定路径
    # ──────────────────────────────────────────────────
    - name: Clone Device Tree
      run: |
        cd ${GITHUB_WORKSPACE}/OrangeFox/fox_${{ inputs.MANIFEST_BRANCH }}
        git clone ${{ inputs.DEVICE_TREE }} -b ${{ inputs.DEVICE_TREE_BRANCH }} ./${{ inputs.DEVICE_PATH }}
        cd ${{ inputs.DEVICE_PATH }}
        echo "COMMIT_ID=$(git rev-parse HEAD)" >> $GITHUB_ENV

    # ──────────────────────────────────────────────────
    # 7. 编译 OrangeFox Recovery
    # ──────────────────────────────────────────────────
    - name: Building OrangeFox
      run: |
        cd ${GITHUB_WORKSPACE}/OrangeFox/fox_${{ inputs.MANIFEST_BRANCH }}
        set +e
        source build/envsetup.sh
        export ALLOW_MISSING_DEPENDENCIES=true
        set -e

        # 解析并应用补丁
        PATCH_INPUT=$(echo "${{ inputs.PATCHES }}" | xargs)
        PATCH_DIR="$ANDROID_BUILD_TOP/${{ inputs.DEVICE_PATH }}"
        RECOVERY_DIR="$ANDROID_BUILD_TOP/bootable/recovery"

        if [ -z "$PATCH_INPUT" ]; then
          echo "=================================================="
          echo "Notice: PATCHES input is empty. Skipping patch stage."
          echo "=================================================="
        else
          echo "================ Applying Patches ================"
          if [ "$PATCH_INPUT" = "all" ]; then
            echo "Applying all patches in device tree..."
            shopt -s nullglob
            for patch in "$PATCH_DIR"/*.patch; do
              echo "Applying $patch..."
              git -C "$RECOVERY_DIR" apply "$patch" || echo "Patch already applied or failed, ignoring..."
            done
            shopt -u nullglob
          else
            echo "Applying specific patches..."
            IFS=',' read -ra PATCH_LIST <<< "$PATCH_INPUT"
            for patch_file in "${PATCH_LIST[@]}"; do
              patch_file=$(echo "$patch_file" | xargs)
              # 再次确认文件名不为空（防止填了恶意逗号如 "a," 导致的空元素）
              if [ -n "$patch_file" ]; then
                if [ -f "$PATCH_DIR/$patch_file" ]; then
                  echo "Applying $patch_file..."
                  git -C "$RECOVERY_DIR" apply "$PATCH_DIR/$patch_file" || echo "Patch already applied or failed, ignoring..."
                else
                  echo "Warning: Patch $patch_file not found in device tree, skipping..."
                fi
              fi
            done
          fi
          echo "=================================================="
        fi

        lunch ${{ inputs.LUNCH_TARGET }} && make clean && mka ${{ inputs.BUILD_TARGET }}image

        # 导出构建环境变量供后续步骤使用
        echo "ANDROID_BUILD_TOP=$ANDROID_BUILD_TOP" >> $GITHUB_ENV

    # ──────────────────────────────────────────────────
    # 8. AVB 签名合并（签名文件在 Action Builder/AVB/, 脚本在根目录）
    # ──────────────────────────────────────────────────
    - name: Merge AVB Signature
      if: inputs.AVB_SIGNATURE != ''
      run: |
        cd ${GITHUB_WORKSPACE}/OrangeFox/fox_${{ inputs.MANIFEST_BRANCH }}

        echo "=================================================="
        echo "AVB 签名合并"
        echo "  签名文件: AVB/${{ inputs.AVB_SIGNATURE }}"
        echo "=================================================="

        export AVB_SIG_FILE="${{ inputs.AVB_SIGNATURE }}"

        python3 ${GITHUB_WORKSPACE}/merge_avb.py

        echo "[+] AVB 签名合并完成!"

    # ──────────────────────────────────────────────────
    # 9. 设置发布信息及环境变量
    # ──────────────────────────────────────────────────
    - name: Set Release Properties
      run: |
        echo "BUILD_DATE=$(TZ=Asia/Shanghai date +%Y%m%d)" >> $GITHUB_ENV
        cd ${GITHUB_WORKSPACE}/OrangeFox/fox_${{ inputs.MANIFEST_BRANCH }}

        DEVICE_TREE_URL="${{ inputs.DEVICE_TREE }}"
        if [[ "${DEVICE_TREE_URL}" == *.git ]]; then
          DEVICE_TREE_URL="${DEVICE_TREE_URL%.git}"
        fi
        echo "DEVICE_TREE_URL=${DEVICE_TREE_URL}" >> $GITHUB_ENV

        # 格式化补丁和签名信息供 body 使用
        PATCH_INFO="${{ inputs.PATCHES }}"
        AVB_INFO="${{ inputs.AVB_SIGNATURE }}"
        if [ -z "$PATCH_INFO" ]; then PATCH_INFO="无"; fi
        if [ -z "$AVB_INFO" ]; then AVB_INFO="无（跳过）"; fi
        echo "RELEASE_PATCHES=$PATCH_INFO" >> $GITHUB_ENV
        echo "RELEASE_AVB=$AVB_INFO" >> $GITHUB_ENV

    # ──────────────────────────────────────────────────
    # 10. 上传到 GitHub Release
    # ──────────────────────────────────────────────────
    - name: Upload to Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          OrangeFox/fox_${{ inputs.MANIFEST_BRANCH }}/out/target/product/${{ inputs.DEVICE_NAME }}/OrangeFox*.img
          OrangeFox/fox_${{ inputs.MANIFEST_BRANCH }}/out/target/product/${{ inputs.DEVICE_NAME }}/OrangeFox*.zip
          OrangeFox/fox_${{ inputs.MANIFEST_BRANCH }}/out/target/product/${{ inputs.DEVICE_NAME }}/recovery_avb_signed.img
        name: OrangeFox Recovery for ${{ inputs.DEVICE_NAME }} // ${{ env.BUILD_DATE }}
        tag_name: ${{ github.run_id }}
        body: |
          ## OrangeFox Recovery 非官方构建版
          源码分支: fox_${{ inputs.MANIFEST_BRANCH }}
          设备: [设备树/分支](${{ env.DEVICE_TREE_URL }}/tree/${{ inputs.DEVICE_TREE_BRANCH }})
          构建提交: [commit](${{ env.DEVICE_TREE_URL }}/commit/${{ env.COMMIT_ID }})
          合入.patch补丁: ${{ env.RELEASE_PATCHES }}
          移植AVB签名: ${{ env.RELEASE_AVB }}
